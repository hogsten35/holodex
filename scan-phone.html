<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#0d1117"/>
<title>HoloDex — Phone Scanner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.logo{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;margin-bottom:6px;letter-spacing:-.5px;}
.logo span{color:#a78bfa;}
.sub{font-size:13px;color:#8b949e;margin-bottom:36px;text-align:center;}
.zone{width:100%;max-width:340px;border:1.5px dashed rgba(255,255,255,0.15);border-radius:16px;min-height:210px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;background:#161b22;position:relative;overflow:hidden;transition:border-color .2s;}
.zone:active{border-color:#7c3aed;}
.zone img{width:100%;height:100%;object-fit:cover;position:absolute;border-radius:14px;}
.zone-icon{font-size:42px;}
.zone-label{font-size:15px;font-weight:600;}
.zone-sub{font-size:13px;color:#8b949e;}
.btns{display:flex;gap:10px;margin-top:14px;width:100%;max-width:340px;}
.btn{flex:1;padding:13px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s;}
.btn:active{opacity:.8;}
.btn-cam{background:#1c2230;color:#e6edf3;border:1px solid rgba(255,255,255,0.12);}
.btn-send{background:#7c3aed;color:#fff;}
.btn-send:disabled{opacity:.35;cursor:not-allowed;}
.status{margin-top:18px;font-size:14px;color:#8b949e;text-align:center;min-height:20px;line-height:1.5;}
.status.ok{color:#3fb950;font-weight:600;}
.status.err{color:#f85149;}
.prog-wrap{width:100%;max-width:340px;height:3px;background:#1c2230;border-radius:2px;margin-top:12px;overflow:hidden;display:none;}
.prog-fill{height:100%;background:#7c3aed;border-radius:2px;transition:width .4s;}
.no-session{color:#f85149;font-size:14px;text-align:center;max-width:280px;line-height:1.6;}
</style>
</head>
<body>
<div class="logo">Holo<span>Dex</span></div>
<div class="sub">BossHog Gaming · Phone Upload</div>

<div id="mainContent">
  <div class="zone" id="zone" onclick="document.getElementById('fileIn').click()">
    <div class="zone-icon">📷</div>
    <div class="zone-label">Tap to take photo</div>
    <div class="zone-sub">Point camera at your card</div>
    <img id="preview" style="display:none;" alt=""/>
  </div>
  <div class="btns">
    <button class="btn btn-cam" onclick="document.getElementById('camIn').click()">📸 Camera</button>
    <button class="btn btn-send" id="sendBtn" disabled onclick="sendImage()">Send to Desktop →</button>
  </div>
  <div class="prog-wrap" id="progWrap"><div class="prog-fill" id="progFill"></div></div>
  <div class="status" id="status">Take a photo of your card to get started.</div>
</div>

<input type="file" id="fileIn" accept="image/*" style="display:none" onchange="handleFile(this)"/>
<input type="file" id="camIn" accept="image/*" capture="environment" style="display:none" onchange="handleFile(this)"/>

<script>
const sessionId = new URLSearchParams(location.search).get('s');

if (!sessionId) {
  document.getElementById('mainContent').innerHTML = '<div class="no-session">⚠️ Invalid or missing session ID.<br/><br/>Please go back to the desktop and click the 📱 button to generate a new QR code.</div>';
}

let imgB64 = null;

function handleFile(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    imgB64 = e.target.result.split(',')[1];
    document.getElementById('preview').src = e.target.result;
    document.getElementById('preview').style.display = 'block';
    document.querySelector('.zone-icon').style.display = 'none';
    document.querySelector('.zone-label').style.display = 'none';
    document.querySelector('.zone-sub').style.display = 'none';
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('status').textContent = 'Photo ready — tap Send to Desktop';
    document.getElementById('status').className = 'status';
  };
  reader.readAsDataURL(file);
}

async function sendImage() {
  if (!imgB64 || !sessionId) return;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true; btn.textContent = 'Sending…';
  const progWrap = document.getElementById('progWrap');
  const progFill = document.getElementById('progFill');
  progWrap.style.display = 'block'; progFill.style.width = '20%';
  document.getElementById('status').textContent = 'Uploading photo…';

  try {
    progFill.style.width = '60%';
    const res = await fetch(`/.netlify/functions/upload-session?action=upload&id=${sessionId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imageBase64: imgB64 })
    });

    progFill.style.width = '100%';

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: 'Upload failed' }));
      throw new Error(err.error || 'Upload failed');
    }

    document.getElementById('status').textContent = '✓ Sent! Switch back to your desktop — it\'s scanning now.';
    document.getElementById('status').className = 'status ok';
    btn.textContent = '✓ Done!';
  } catch(e) {
    document.getElementById('status').textContent = 'Error: ' + e.message;
    document.getElementById('status').className = 'status err';
    btn.disabled = false; btn.textContent = 'Retry →';
    progFill.style.width = '0%';
  }
}
</script>
</body>
</html>
